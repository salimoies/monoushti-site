<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جدول الشغل</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <div class="card" id="loginCard">
      <h1>جدول الشغل</h1>
      <p class="subtitle">سجّل دخولك حتى تشوف دوامك</p>

      <label for="username">الاسم</label>
      <input type="text" id="username" placeholder="مثال: salim" />

      <label for="password">كلمة المرور</label>
      <input type="password" id="password" placeholder="اكتب كلمة المرور" />

      <button type="button" id="loginBtn">دخول</button>
      <p id="errorMessage" class="error"></p>
    </div>

    <div class="card hidden" id="dashboardCard">
      <div class="topRow">
        <div>
          <h2 id="welcomeText">أهلًا</h2>
          <p class="subtitle">هذا جدولك الحالي</p>
        </div>
        <button type="button" id="logoutBtn" class="logout-btn">تسجيل خروج</button>
      </div>

      <div class="info-box">
        <p><strong>الاسم:</strong> <span id="workerName"></span></p>
        <p><strong>المنصب:</strong> <span id="workerRole"></span></p>
        <p><strong>العطلة:</strong> <span id="workerOffDay"></span></p>
      </div>

      <h3>أيام الدوام</h3>
      <div id="scheduleList" class="schedule-list"></div>
    </div>

    <div class="card hidden" id="managerCard">
      <div class="topRow">
        <div>
          <h2>لوحة الإدارة</h2>
          <p class="subtitle">إدارة الموظفين والجداول</p>
        </div>
        <button type="button" id="managerLogoutBtn" class="logout-btn">تسجيل خروج</button>
      </div>

      <button type="button" id="addWorkerBtn">إضافة موظف</button>
      <div id="workersList" class="schedule-list" style="margin-top: 20px;"></div>
    </div>
    <div id="workerFormCard" class="card hidden" style="margin-top:20px;">
  <h3 id="formTitle">إضافة عامل</h3>

  <label>اسم المستخدم</label>
  <input type="text" id="formUsername" />

  <label>كلمة المرور</label>
  <input type="text" id="formPassword" />

  <label>الاسم الكامل</label>
  <input type="text" id="formName" />

  <label>المنصب</label>
  <input type="text" id="formRole" />

  <label>يوم العطلة</label>
  <input type="text" id="formOff" />

  <label>الاثنين</label>
  <input type="text" id="monInput" placeholder="مثال: 12:00 - 20:00 أو عطلة" />

  <label>الثلاثاء</label>
  <input type="text" id="tueInput" />

  <label>الأربعاء</label>
  <input type="text" id="wedInput" />

  <label>الخميس</label>
  <input type="text" id="thuInput" />

  <label>الجمعة</label>
  <input type="text" id="friInput" />

  <label>السبت</label>
  <input type="text" id="satInput" />

  <label>الأحد</label>
  <input type="text" id="sunInput" />

  <button type="button" id="saveWorkerBtn">حفظ</button>
  <button type="button" id="cancelWorkerBtn" class="logout-btn" style="margin-top:10px;">إلغاء</button>
</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
