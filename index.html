<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم دلوعتي 🎀</title>

<style>
:root{
--pink:#ff5aa5;
--pink2:#ff8fc2;
--bg1:#ffd9ec;
--bg2:#ffc2e2;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
overflow:hidden;
color:#7a1d4f;
}

.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
transition:.6s;
transform:translateX(120%);
opacity:0;
padding:20px;
}

.page.active{
transform:translateX(0);
opacity:1;
}

.page.left{
transform:translateX(-120%);
opacity:0;
}

.card{
background:white;
padding:25px;
border-radius:32px;
text-align:center;
max-width:420px;
width:95%;
box-shadow:0 20px 40px rgba(255,90,165,.25);
}

button{
padding:12px 20px;
border-radius:30px;
border:none;
cursor:pointer;
background:linear-gradient(90deg,var(--pink2),var(--pink));
color:white;
font-weight:bold;
margin-top:12px;
}

input{
padding:10px;
border-radius:20px;
border:2px solid var(--pink2);
width:80%;
text-align:center;
}

.next{
position:fixed;
bottom:20px;
left:20px;
}

.hidden{display:none;}

.mem-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.mem{
background:white;
border-radius:20px;
padding:20px;
cursor:pointer;
font-size:24px;
border:2px solid var(--pink2);
}

.shake{
animation:shake .3s;
}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(8px)}
50%{transform:translateX(-8px)}
75%{transform:translateX(6px)}
100%{transform:translateX(0)}
}

/* Floating hearts */
.bg span{
position:absolute;
animation:float 8s linear infinite;
opacity:.5;
}
@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<audio id="pop" preload="auto">
<source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=">
</audio>

<!-- Welcome -->
<div class="page active" id="welcome">
<div class="card">
<h1>أهلاً بك في عالم دلوعتي 🎀</h1>
<p>بدأت الحكاية بـ 03.02</p>
<button onclick="playPop(); go('verify')">البداية هون 👇</button>
</div>
</div>

<!-- Verify -->
<div class="page" id="verify">
<div class="card">
<h2>قبل ما نبدأ لازم أتأكد من هويتك</h2>
<button onclick="playPop(); go('q1')">اضغطي هون لحتى تجاوبي على الأسئلة</button>
</div>
</div>

<!-- Q1 -->
<div class="page" id="q1">
<div class="card" id="card1">
<h2>شو أكتر اسم بحب ناديكي فيه؟</h2>
<input id="a1">
<button onclick="playPop(); checkQ1()">تأكيد</button>
<p id="m1"></p>
</div>
</div>

<!-- Q2 -->
<div class="page" id="q2">
<div class="card" id="card2">
<h2>لما أقلك بحبك شو بتردي عليّ؟</h2>
<button onclick="playPop(); checkQ2('احبك كثير')">احبك كثير</button>
<button onclick="playPop(); checkQ2('ما احبك')">ما احبك</button>
<button onclick="playPop(); checkQ2('اكرهك')">اكرهك</button>
<p id="m2"></p>
</div>
</div>

<!-- Q3 -->
<div class="page" id="q3">
<div class="card" id="card3">
<h2>اختاري أكثر 3 كلمات بتقوليهم</h2>
<div id="q3Options"></div>
<button onclick="playPop(); checkQ3()">تأكيد</button>
<p id="m3"></p>
</div>
</div>

<script>
const options=[
"احبك",
"نعسانه",
"اعشقك",
"جوعانة",
"مشتاقتلك",
"ضهري عم يوجعني"
];

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function loadQ3(){
const container=document.getElementById("q3Options");
container.innerHTML="";
shuffle(options).forEach(opt=>{
let label=document.createElement("label");
label.innerHTML=`<input type="checkbox" value="${opt}"> ${opt}`;
container.appendChild(label);
container.appendChild(document.createElement("br"));
});
}

loadQ3();

function playPop(){
let p=document.getElementById("pop");
p.currentTime=0;
p.play().catch(()=>{});
}

for(let i=0;i<25;i++){
let s=document.createElement('span');
s.innerHTML='💖';
s.style.left=Math.random()*100+'vw';
s.style.fontSize=(15+Math.random()*20)+'px';
s.style.animationDuration=(5+Math.random()*5)+'s';
document.getElementById('bg').appendChild(s);
}

function go(id){
document.querySelectorAll('.page').forEach(p=>{
if(p.classList.contains('active')){
p.classList.remove('active');
p.classList.add('left');
}
});
let next=document.getElementById(id);
next.classList.remove('left');
next.classList.add('active');
if(id==='q3'){loadQ3();}
}

function checkQ1(){
if(document.getElementById('a1').value.trim()==='منوشتي'){
go('q2');
}else{shake('card1');}
}

function checkQ2(val){
if(val==='اكرهك'){
go('q3');
}else{shake('card2');}
}

function checkQ3(){
let checked=[...document.querySelectorAll('#q3Options input:checked')].map(i=>i.value);
if(checked.length!==3){shake('card3');return;}
let correct=['جوعانة','ضهري عم يوجعني','نعسانه'];
if(correct.every(v=>checked.includes(v))){
go('celebrate');
}else{shake('card3');}
}

function shake(id){
let el=document.getElementById(id);
el.classList.add('shake');
setTimeout(()=>el.classList.remove('shake'),300);
}
</script>

</body>
</html>
